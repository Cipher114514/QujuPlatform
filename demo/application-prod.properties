# ==========================================
# 生产环境配置
# ==========================================
spring.application.name=demo

# MySQL 生产配置
spring.datasource.url=jdbc:mysql://localhost:3306/quju?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia%2FShanghai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=你的生产数据库密码
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA - 生产环境建议用 validate，避免误改表结构
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT - 生产环境务必更换密钥！
app.jwt.secret=请在此填入一段长随机字符串至少256位用于JWT签名
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads

# Server
server.port=8080

# AI 配置（按需填写）
