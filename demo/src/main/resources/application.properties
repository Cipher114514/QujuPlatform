# ==========================================
# 生产环境配置
# ==========================================
spring.application.name=demo

# H2 开发配置（快速启动，无需安装MySQL）
spring.datasource.url=jdbc:h2:mem:quju;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# JWT
app.jwt.secret=demoSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Server
server.port=8080

# Redis（app.redis.enabled=false 则跳过 Redisson 初始化）
app.redis.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

