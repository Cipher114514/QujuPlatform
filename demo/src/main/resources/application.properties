app.ai.openai.api-key=sk-151d4773970b4af891e5f0aa25c4cd33
app.ai.openai.model=qwen3.7-plus

# ==========================================
# 高德地图配置
# ==========================================
# 高德地图 Web 服务 API Key（后端用于后端调用API获取地理编码、POI搜索等数据）
# 获取方式：登录高德开放平台 -> 应用管理 -> 创建应用 -> 获取 Key
# 注意：Web 服务 Key 和 JS API Key 需要分别配置，不能混用
app.amap.web-api-key=your_amap_web_api_key_here

# 高德地图 JS API Key（前端用于在浏览器端加载地图组件、渲染地图界面）
# 获取方式同 Web API Key，但需选择 JS API 平台
# 注意：JS API Key 需要绑定域名，本地开发请配置为 localhost
app.amap.js-api-key=your_amap_js_api_key_here

# 高德地图 JS API 安全密钥（在高德控制台生成）
# 路径：高德开放平台 -> 应用管理 -> 你的应用 -> 安全密钥
app.amap.security-code=your_amap_security_code_here

# 高德地图JS API版本
app.amap.js-version=2.0

# ==========================================
# Redis 配置（Redisson 分布式锁）
# ==========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
# 连接池（RedissonConfig 引用）
# spring.data.redis.host/port/password 三个属性被 RedissonConfig 读取
