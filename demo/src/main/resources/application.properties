spring.application.name=demo

# ==========================================
# 数据库配置（二选一）
# ==========================================

# --- 选项1: H2内存数据库（单人开发，开箱即用）---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- 选项2: MySQL 8.0（团队协作）---
# spring.datasource.url=jdbc:mysql://localhost:3306/quju?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia%2FShanghai&createDatabaseIfNotExist=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=103103hh@
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=demoSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Server
server.port=8080

# ==========================================
# AI 活动策划配置
# ==========================================
# 选择 Provider: openai / template
app.ai.provider=openai

