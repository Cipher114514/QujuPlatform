<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣聚 - 线下活动社交平台</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- SockJS + STOMP.js（WebSocket 通信基础库） -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@5/bundles/stomp.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <!-- 高德地图 JS API v2.0（预加载 PlaceSearch + Geocoder 插件） -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=e2b8380f7622429624a520709bd07227&plugin=AMap.PlaceSearch,AMap.Geocoder"></script>
    <!-- 基础库（顺序不能乱） -->
    <script src="/js/api.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/ws-client.js"></script>
    <!-- 组件 -->
    <script src="/js/components/navbar.js"></script>
    <script src="/js/components/MapComponent.js"></script>
    <script src="/js/components/skeleton.js"></script>
    <!-- 页面模块（新人在这里追加自己的脚本） -->
    <script src="/js/pages/login.js"></script>
    <script src="/js/pages/register.js"></script>
    <script src="/js/pages/home.js"></script>
    <script src="/js/pages/profile.js"></script>
    <script src="/js/pages/activities.js"></script>
    <script src="/js/pages/friends.js"></script>
    <script src="/js/pages/create-activity.js"></script>
    <script src="/js/pages/activity-detail.js"></script>
    <script src="/js/pages/activity-qrcode.js"></script>
    <script src="/js/pages/activity-checkin.js"></script>
    <script src="/js/pages/my-registrations.js"></script>
    <script src="/js/pages/activity-waitlist.js"></script>
    <script src="/js/pages/chat-list.js"></script>
    <script src="/js/pages/chat-room.js"></script>
    <script src="/js/pages/discover.js"></script>
    <script src="/js/pages/follows.js"></script>
    <script src="/js/pages/ai-create.js"></script>
    <script src="/js/pages/my-activities.js"></script>
    <script src="/js/pages/my-teams.js"></script>
    <script src="/js/pages/teams.js"></script>
    <script src="/js/pages/team-detail.js"></script>
    <script src="/js/pages/team-chat.js"></script>
    <script src="/js/pages/team-create-activity.js"></script>
    <script src="/js/pages/team-album.js"></script>
    <script src="/js/pages/admin.js"></script>
    <script src="/js/pages/pending.js"></script>
    <script src="/js/pages/review.js"></script>
    <script src="/js/pages/retrospect.js"></script>
    <script src="/js/pages/map.js"></script>
</head>
<body>
    <!-- 导航栏：登录后自动显示 -->
    <div id="navbarSlot"></div>

    <!-- 页面内容区：路由匹配后自动替换 -->
    <div id="app"></div>

    <script>
        // ===== 启动App =====
        var navbarSlot = document.getElementById('navbarSlot');

        function updateNavbar() {
            navbarSlot.innerHTML = Navbar.render();
        }

        // 路由切换时自动更新导航栏
        window.addEventListener('hashchange', updateNavbar);
        window.addEventListener('load', updateNavbar);

        // 启动路由
        Router.start();
    </script>
</body>
</html>
